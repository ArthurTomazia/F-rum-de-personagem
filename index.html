<html lang="en">

<head>

                        <div class="col">

                                    <div class="C-senha">

                                    </div>

                                        <button class="btn btn-primary" class="botao" type="submit">Enviar</button>
                                    </div>
                                    <div id="resultado"></div>
                                </form>
                                <div>
                                    <h2 id="mensagem"></h2>
                                    <div class="toggle" id="toggle">

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>





        <div>
